<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-QueenCart — Collection</title>
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="shortcut icon" href="favicon.png?v=2">
  <link rel="apple-touch-icon" href="favicon.png?v=2">
  <meta name="description" content="Browse our exclusive collection of luxury jewellery and accessories." />
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QBQ06VWE34"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QBQ06VWE34');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <style>
    :root { 
      --cream: #faf8f5; 
      --gold: #c8a97e; 
      --gold-light: #e8d9c0; 
      --dark: #1a3a32; 
      --muted: #8a8a8a; 
      --accent-soft: rgba(200, 169, 126, 0.1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);cursor:none;overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 4rem;background:rgba(249,245,239,.97);backdrop-filter:blur(12px);box-shadow:0 1px 20px rgba(0,0,0,.06)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;letter-spacing:.3em;color:var(--dark);text-decoration:none}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dark);text-decoration:none;transition:color .3s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold)}
    .nav-actions{display:flex;gap:1rem;align-items:center}
    .btn-nav{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:.55rem 1.4rem;border:1px solid var(--dark);background:transparent;color:var(--dark);cursor:pointer;transition:all .3s;text-decoration:none}
    .btn-nav:hover{background:var(--dark);color:var(--cream)}

    /* Page Header */
    .page-header{padding:9rem 4rem 3rem;text-align:center}
    .breadcrumb{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    .breadcrumb a{color:var(--muted);text-decoration:none}.breadcrumb a:hover{color:var(--gold)}
    .page-tag{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
    .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:300;margin-bottom:.8rem}
    .page-sub{font-size:.88rem;color:var(--muted);max-width:500px;margin:0 auto}

    /* Shop Layout */
    .shop-wrapper{display:grid;grid-template-columns:260px minmax(0,1fr);gap:3rem;max-width:1400px;margin:0 auto;padding:2rem 4rem 6rem;width:100%}

    /* Sidebar */
    .sidebar{background:white;padding:2rem;height:fit-content;position:sticky;top:6rem}
    .filter-title{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dark);margin-bottom:1.5rem;padding-bottom:.8rem;border-bottom:1px solid var(--gold-light)}
    .filter-group{margin-bottom:1.5rem}
    .filter-group-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem}
    .filter-options{display:flex;flex-direction:column;gap:.5rem}
    .filter-checkbox{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:var(--dark);cursor:pointer}
    .filter-checkbox input{accent-color:var(--gold);cursor:pointer}

    /* Price Range */
    .price-range-wrap{padding:.5rem 0}
    .price-range{width:100%;accent-color:var(--gold);cursor:pointer}
    .price-display{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:.5rem}

    /* Clear button only */
    .btn-clear{width:100%;padding:.7rem;border:1px solid var(--gold-light);background:transparent;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .3s;margin-top:.5rem}
    .btn-clear:hover{border-color:var(--dark);color:var(--dark)}
    .btn-apply{width:100%;padding:.7rem;border:none;background:var(--dark);font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cream);cursor:pointer;transition:all .3s;margin-top:.5rem;margin-bottom:.5rem}
    .btn-apply:hover{background:var(--gold)}

    /* Products Area */
    .products-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--gold-light)}
    .products-count{font-size:.78rem;color:var(--muted);letter-spacing:.1em}
    .sort-select{padding:.5rem 1rem;border:1px solid var(--gold-light);background:var(--cream);font-family:'Jost',sans-serif;font-size:.78rem;color:var(--dark);outline:none;cursor:pointer}
    .view-toggle{display:flex;gap:.3rem}
    .view-btn{width:32px;height:32px;border:1px solid var(--gold-light);background:transparent;font-size:.85rem;color:var(--muted);cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}
    .view-btn.active,.view-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark)}

    /* Products Grid */
    .products-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:2rem}
    .product-card{background:white;overflow:hidden;transition:transform .3s}
    .product-card:hover{transform:translateY(-4px)}
    .product-img-wrap{position:relative;overflow:hidden;margin-bottom:0}
    .product-img-wrap img{width:100%;aspect-ratio:1/1;height:auto;max-height:320px;object-fit:contain;padding:0.4rem;background:#fff;transition:transform .5s ease;display:block}
    .product-card:hover .product-img-wrap img{transform:scale(1.06)}
    .product-actions{position:absolute;bottom:0;left:0;right:0;background:rgba(26,21,16,.9);padding:.8rem;display:flex;gap:.6rem;transform:translateY(100%);transition:transform .35s ease}
    .product-card:hover .product-actions{transform:translateY(0)}
    .btn-cart{flex:1;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:.6rem;background:var(--gold);color:#fff;border:none;cursor:pointer;transition:background .3s}
    .btn-cart:hover{background:var(--cream);color:var(--dark)}
    .btn-wish{width:36px;height:36px;border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;flex-shrink:0;transition:all .3s}
    .btn-wish:hover,.btn-wish.active{background:white;color:var(--dark)}
    .product-badge{position:absolute;top:.8rem;left:.8rem;background:var(--gold);color:#fff;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.25rem .6rem}
    .product-badge.sale{background:#8b2635}
    .product-card-info{padding:1rem}
    .product-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;color:var(--dark);margin-bottom:.25rem}
    .product-category{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
    .product-price{font-size:.85rem;color:var(--gold);letter-spacing:.05em}
    .product-price .old{color:var(--muted);text-decoration:line-through;margin-right:.4rem;font-size:.78rem}
    .product-stars{color:var(--gold);font-size:.7rem;margin-bottom:.2rem}

    /* List view */
    .products-grid.list-view{grid-template-columns:1fr}
    .products-grid.list-view .product-card{display:grid;grid-template-columns:200px 1fr;border-bottom:1px solid var(--gold-light)}
    .products-grid.list-view .product-img-wrap img{height:220px;padding:0.3rem}
    .list-info{display:flex;flex-direction:column;justify-content:center;padding:1.5rem}
    .list-desc{font-size:.82rem;color:var(--muted);margin:.5rem 0 1rem;line-height:1.6}
    .list-actions{display:flex;gap:.8rem}
    .btn-cart-list{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:.6rem 1.5rem;background:var(--dark);color:#fff;border:none;cursor:pointer;transition:background .3s}
    .btn-cart-list:hover{background:var(--gold)}

    /* Pagination */
    .pagination{display:flex;justify-content:center;gap:.5rem;padding:3rem 0}
    .page-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gold-light);background:transparent;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .3s}
    .page-btn.active,.page-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark)}

    /* No results */
    .no-results{text-align:center;padding:5rem 0;color:var(--muted)}
    .no-results h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;margin-bottom:.5rem}

    /* Toast */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark);color:var(--cream);padding:1rem 2rem;font-size:.82rem;z-index:9999;transform:translateY(100px);opacity:0;transition:all .4s}
    .toast.show{transform:translateY(0);opacity:1}

    .toast.show{transform:translateY(0);opacity:1}

    @media (max-width: 1024px) {
      .shop-wrapper { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 2rem 4rem; }
      .sidebar { position: static; padding: 1.5rem; width: 100%; box-shadow: var(--shadow-sm); border-radius: 8px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
      .page-header { padding: 7rem 2rem 2rem; }
    }
    @media (max-width: 600px) {
      .products-grid { grid-template-columns: 1fr; }
      .page-header, .shop-wrapper { padding-left: 1.5rem; padding-right: 1.5rem; }
      .page-title { font-size: 2.5rem !important; }
    }
  </style>

  <link rel="stylesheet" href="enhanced-theme.css" />
  <script src="luxury-ui.js"></script>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- NAV: Home | Collection | Cart | About — no cart icon in top-right -->
<nav>
  <div class="menu-toggle" id="menuToggle">
    <span></span><span></span><span></span>
  </div>
  <a href="index.html" class="nav-logo">D-QueenCart</a>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html" class="active">Collection</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="index.html#about">About</a></li>
  </ul>
  <div class="nav-actions">
    <a href="auth.html" class="btn-nav" id="navSignIn">Sign In</a>
    <div id="navUser" style="display:none;align-items:center;gap:0.8rem">
  <span id="navUserName" style="font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dark)"></span>

</div>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb"><a href="index.html">Home</a> / <span>Collection</span></div>
  <p class="page-tag">Curated for You</p>
  <h1 class="page-title">Our Collection</h1>
  <p class="page-sub">Handcrafted jewellery and accessories, designed to last a lifetime.</p>
</div>

<div class="shop-wrapper">
  <!-- Sidebar Filters — Apply Filters button removed; checkboxes auto-apply -->
  <aside class="sidebar">
    <div class="filter-title">Filter & Refine</div>
    <div class="filter-group">
      <div class="filter-group-label">Category</div>
      <div class="filter-options">
        <label class="filter-checkbox"><input type="checkbox" value="necklaces" /> Necklaces & Pendants</label>
        <label class="filter-checkbox"><input type="checkbox" value="earrings" /> Earrings</label>
        <label class="filter-checkbox"><input type="checkbox" value="studs" /> Studs</label>
        <label class="filter-checkbox"><input type="checkbox" value="rings" /> Rings</label>
        <label class="filter-checkbox"><input type="checkbox" value="bangles" /> Bangles</label>
        <label class="filter-checkbox"><input type="checkbox" value="hair-accessories" /> Hair Accessories</label>
        <label class="filter-checkbox"><input type="checkbox" value="waist-chains" /> Waist Chains</label>
        <label class="filter-checkbox"><input type="checkbox" value="bracelets" /> Bracelets</label>
        <label class="filter-checkbox"><input type="checkbox" value="anklets" /> Anklets</label>
        <label class="filter-checkbox"><input type="checkbox" value="scrunchies" /> Scrunchies</label>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-group-label">Price Range</div>
      <div class="price-range-wrap">
        <input type="range" class="price-range" id="priceRange" min="30" max="400" value="400" step="1" oninput="updatePrice(this.value)" />
        <div class="price-display"><span>₹30</span><span id="priceMax">₹400</span></div>
      </div>
    </div>
    <button class="btn-apply" onclick="applyFilters()">Apply Filters</button>
    <button class="btn-clear" onclick="clearFilters()">Clear All</button>
  </aside>

  <!-- Products Area -->
  <div class="products-area">
    <div class="products-toolbar">
      <span class="products-count" id="productsCount">Loading products...</span>
      <div style="display:flex;gap:1rem;align-items:center">
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="newest">Newest First</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid', this)" title="Grid">⊞</button>
          <button class="view-btn" onclick="setView('list', this)" title="List">☰</button>
        </div>
      </div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="cart.js"></script>
<script src="shared.js"></script>
<script>
AOS.init({ duration:700, once:true });

// ── Products Data ────────────────────────────────────────────
const allProducts = [];

let filteredProducts = [...allProducts];
let currentPage = 1;
const perPage = 6;
let currentView = 'grid';

function updatePrice(val) {
  document.getElementById('priceMax').textContent = '₹' + parseInt(val).toLocaleString();
}

function applyFilters() {
  const maxPrice = parseInt(document.getElementById('priceRange').value, 10);
  const catBoxes = Array.from(document.querySelectorAll('.filter-options input[type=checkbox]:checked')).map(c => c.value.toLowerCase().trim());
  
  filteredProducts = allProducts.filter(p => {
    // Make matching case-insensitive
    const pCat = (p.category || '').toLowerCase().trim();
    // Parse price safely
    const pPrice = Number(p.price || 0);

    return (catBoxes.length === 0 || catBoxes.includes(pCat)) && pPrice <= maxPrice;
  });
  
  currentPage = 1;
  const sortVal = document.querySelector('.sort-select').value;
  applySorting(sortVal);
}

function clearFilters() {
  document.querySelectorAll('.filter-options input[type=checkbox]').forEach(c => c.checked = false);
  document.getElementById('priceRange').value = 400;
  document.getElementById('priceMax').textContent = '₹400';
  
  filteredProducts = [...allProducts];
  currentPage = 1;
  const sortVal = document.querySelector('.sort-select').value;
  applySorting(sortVal);
}

function sortProducts(val) {
  applySorting(val);
}

function applySorting(val) {
  if (val==='price-asc') filteredProducts.sort((a,b)=>Number(a.price||0)-Number(b.price||0));
  else if (val==='price-desc') filteredProducts.sort((a,b)=>Number(b.price||0)-Number(a.price||0));
  else if (val==='newest') {
    // If createdAt is available, sort by that. Otherwise fall back to string id descending.
    filteredProducts.sort((a,b)=>{
      if (a.createdAt && b.createdAt) return String(b.createdAt).localeCompare(String(a.createdAt));
      return String(b.id).localeCompare(String(a.id));
    });
  }

  else {
    // 'featured' -> sort by original allProducts index position
    filteredProducts.sort((a,b)=> {
      return allProducts.findIndex(p => p.id === a.id) - allProducts.findIndex(p => p.id === b.id);
    });
  }
  renderProducts();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('productsGrid').classList.toggle('list-view', view==='list');
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const start = (currentPage-1)*perPage;
  const page = filteredProducts.slice(start, start+perPage);
  document.getElementById('productsCount').textContent = `${filteredProducts.length} Products`;

  if (page.length === 0) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><h3>No products found</h3><p>Try adjusting your filters</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  if (currentView === 'list') {
    grid.innerHTML = page.map((p,i) => `
      <div class="product-card" style="animation-delay:${i*0.08}s">
        <div class="product-img-wrap">
          <img src="${p.image}" alt="${p.name}" loading="lazy"/>
          ${p.badge?`<div class="product-badge${p.badge==='Sale'?' sale':''}">${p.badge}</div>`:''}
        </div>
        <div class="list-info">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${p.oldPrice?`<span class="old">₹${p.oldPrice.toLocaleString()}</span>`:''} ₹${p.price.toLocaleString()}</div>
          ${p.stock > 0 && p.stock <= 5 ? `<div style="color:#c0392b;font-size:0.65rem;margin-top:0.3rem;letter-spacing:0.05em">Only ${p.stock} left in stock!</div>` : ''}
          ${p.stock <= 0 ? `<div style="color:#c0392b;font-size:0.65rem;margin-top:0.3rem;font-weight:500;letter-spacing:0.05em">Currently Out of Stock</div>` : ''}
          <div class="list-actions" style="margin-top:.8rem">
            <button class="btn-cart-list" ${p.stock <= 0 ? 'disabled style="background:#8a8a8a;cursor:not-allowed"' : ''} onclick="addToCart('${p.id}')">
              ${p.stock <= 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      </div>`).join('');
  } else {
    grid.innerHTML = page.map((p,i) => {
      const isOut = p.stock <= 0;
      return `
      <div class="product-card" style="animation-delay:${i*0.08}s">
        <div class="product-img-wrap" style="${isOut ? 'opacity:0.7' : ''}">
          <img src="${p.image}" alt="${p.name}" loading="lazy"/>
          ${p.badge?`<div class="product-badge${p.badge==='Sale'?' sale':''}">${p.badge}</div>`:''}
          <div class="product-actions">
            <button class="btn-cart" ${isOut ? 'disabled style="background:#8a8a8a;cursor:not-allowed"' : ''} onclick="addToCart('${p.id}')">
              ${isOut ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
        <div class="product-card-info">
          <div class="product-name">${p.name}</div>
          <div class="product-category">${p.category}</div>
          <div class="product-price">${p.oldPrice?`<span class="old">₹${p.oldPrice.toLocaleString()}</span>`:''} ₹${p.price.toLocaleString()}</div>
          ${p.stock > 0 && p.stock <= 5 ? `<div style="color:#c0392b;font-size:0.65rem;margin-top:0.3rem;letter-spacing:0.05em">Only ${p.stock} left in stock!</div>` : ''}
          ${p.stock <= 0 ? `<div style="color:#c0392b;font-size:0.65rem;margin-top:0.3rem;font-weight:500;letter-spacing:0.05em">Currently Out of Stock</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Pagination
  const totalPages = Math.ceil(filteredProducts.length / perPage);
  if (totalPages > 1) {
    document.getElementById('pagination').innerHTML = Array.from({length:totalPages},(_,i) =>
      `<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`
    ).join('');
  } else {
    document.getElementById('pagination').innerHTML = '';
  }
}

function goPage(n) { currentPage=n; renderProducts(); window.scrollTo({top:300,behavior:'smooth'}); }

function addToCart(id) {
  const p = allProducts.find(x => String(x.id) === String(id));
  if (!p) return;
  const res = DQueenCartUtil.add(p);
  showToast(res.msg);
}


// URL param filter (from category clicks)
const urlParam = new URLSearchParams(window.location.search).get('cat');
if (urlParam) {
  document.querySelectorAll('.filter-options input[type=checkbox]').forEach(c => { c.checked = c.value===urlParam; });
}

// Load from Firebase if available, else render sample
function loadProducts() {
  const loc = JSON.parse(localStorage.getItem('dqueencart_products') || 'null');
  if (loc && loc.length > 0) {
    allProducts.length = 0;
    allProducts.push(...loc.map(p => ({id: p._id, ...p})));
  }
  try {
    if (typeof db !== 'undefined') {
      const fallback = setTimeout(() => applyFilters(), 2500);
      db.collection('products').get().then(snap => {
        clearTimeout(fallback);
        if (snap.docs.length > 0) {
          const prods = snap.docs.map(d=>({id:d.id,...d.data()}));
          allProducts.length = 0;
          allProducts.push(...prods);
        }
        applyFilters();
      }).catch(()=>{
        clearTimeout(fallback);
        applyFilters();
      });
    } else applyFilters();
  } catch { applyFilters(); }
}

loadProducts();
</script>
</body>
</html>
